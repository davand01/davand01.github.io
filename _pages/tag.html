---
layout: menu-page
title: Tag
permalink: tag:output_ext
---
{% include calculate_relative_base.html %}

<section class="max-w-7xl mx-auto px-8">
  <div class="md:max-w-3xl">
    <noscript>
      <p class="text-on-surface-variant py-8">JavaScript is required to view a single tag. <a href="{{ relativebase }}tags.html" class="text-tertiary underline">View the full tag index</a> instead.</p>
    </noscript>
    <div id="tag-content"></div>
  </div>
</section>

<script type="application/json" id="tag-data">
[{% assign sorted_tags = site.tags | sort %}{% for tag_entry in sorted_tags %}{% assign tag_name = tag_entry[0] %}{% assign tag_posts = tag_entry[1] %}{
"tag": {{ tag_name | jsonify }},
"posts": [{% for post in tag_posts %}{% include remove_double_slash.html %}{
"url": {{ post_url | jsonify }},
"title": {{ post.title | jsonify }},
"date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
"date_display": {{ post.date | date: "%B %-d, %Y" | jsonify }},
"excerpt": {{ post.content | strip_html | strip_newlines | truncatewords: 40 | jsonify }}
}{% unless forloop.last %},{% endunless %}{% endfor %}]
}{% unless forloop.last %},{% endunless %}{% endfor %}]
</script>

<script>
(function () {
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  var params = new URLSearchParams(window.location.search);
  var tag = params.get('tag');
  var container = document.getElementById('tag-content');
  var dataEl = document.getElementById('tag-data');

  if (!container || !dataEl) return;

  if (!tag) {
    container.innerHTML = '<p class="text-on-surface-variant py-8">No tag specified. <a href="./tags.html" class="text-tertiary underline">Browse all tags</a>.</p>';
    return;
  }

  var data;
  try {
    data = JSON.parse(dataEl.textContent);
  } catch (e) {
    container.innerHTML = '<p class="text-on-surface-variant py-8">Error loading tag data.</p>';
    return;
  }

  var match = data.find(function (t) { return t.tag === tag; });

  if (!match || !match.posts || match.posts.length === 0) {
    container.innerHTML = '<p class="text-on-surface-variant py-8">No posts found for tag "<strong>' + escapeHtml(tag) + '</strong>". <a href="./tags.html" class="text-tertiary underline">Browse all tags</a>.</p>';
    return;
  }

  document.title = match.tag + ' - David Andersson';
  var pageH1 = document.querySelector('main h1');
  if (pageH1) pageH1.textContent = match.tag;

  container.innerHTML = match.posts.map(function (p) {
    return '<article class="py-6 border-b border-outline-variant/10 last:border-b-0">' +
      '<a class="block font-bold text-lg text-on-surface hover:text-tertiary transition-colors no-underline" href="' + escapeHtml(p.url) + '">' + escapeHtml(p.title) + '</a>' +
      '<time class="text-xs font-label tracking-widest text-outline uppercase mt-2 block" datetime="' + escapeHtml(p.date) + '">' + escapeHtml(p.date_display) + '</time>' +
      '<p class="text-sm text-on-surface-variant mt-3 leading-relaxed">' + escapeHtml(p.excerpt) + '…</p>' +
    '</article>';
  }).join('');
})();
</script>
