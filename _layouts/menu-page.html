layout: default
---
{% include header.html %}
<main class="pt-32 pb-24">
  <section class="max-w-7xl mx-auto px-8 mb-20">
    <div class="md:max-w-3xl">
      <h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter text-on-surface mb-6 leading-[1.1]">{{ page.title }}</h1>
      {% if page.description %}
      <p class="text-lg text-secondary max-w-2xl leading-relaxed">{{ page.description }}</p>
      {% endif %}
    </div>
  </section>
  {{ content }}
</main>
