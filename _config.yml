# Newsletter
#mailchimp: ""

# Tracker
#analytics:

# Paginate
paginate: 6
paginate_path: 'page:num'
words_per_minute: 200

extensions:
  mermaid_enable: true

# Comments
comments: #utteranc  #[disqus, utteranc]
comments_opts:
  comments_curtain: yes
  repo:
  issue_term:
  label:
  theme:
  discus_identifier:

# Build settings
markdown: kramdown
highlighter: rouge
highlight_theme: syntax-base16.monokai.dark
compress_html:
  clippings: all
  comments: all
  startings: [html, head, body]

# Outputting
timezone: "Europe/Stockholm"

sass:
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap

include: [_pages]
exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock", "package-lock.json", "assets/css/sass/"]
