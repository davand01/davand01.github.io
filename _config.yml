linkedin: davidandersson-se
github: davand01
twitter: ''

# PGP / GPG
pgp:
  fingerprint: "F104 53D7 C70F 054F CB32\n8185 03F0 AB3C 88DC 66BF"
  key_id: "0x03F0AB3C88DC66BF"
