{% if site.mailchimp %}
<aside class="bg-tertiary p-8 text-on-tertiary rounded-sm mt-12">
  <h3 class="text-2xl font-bold tracking-tight mb-4 font-headline">Stay Updated</h3>
  <p class="text-sm mb-6 opacity-90 leading-relaxed">Get new articles delivered straight to your inbox. No spam, just insights.</p>
  <form action="{{ site.mailchimp }}" method="post" class="space-y-4" target="_blank" novalidate>
    <input class="w-full bg-white/10 border-white/20 text-white placeholder:text-white/50 text-sm py-3 px-4 focus:ring-1 focus:ring-white rounded-sm" placeholder="Email Address" type="email" name="EMAIL" required>
    <button class="w-full bg-white text-tertiary font-bold text-xs uppercase tracking-widest py-3 hover:bg-opacity-90 transition-all" type="submit">Subscribe</button>
  </form>
</aside>
{% endif %}
