{% include calculate_relative_base.html %}
{% include escape-404.html %}

<script src="{{ relativebase }}assets/js/jekyll-search.js"></script>

{% if page.layout == "post" %}
<script>
  function copyToClipboard() {
    navigator.clipboard.writeText('{{ site.url }}{{ page.url }}').then(function() {
      var alerts = document.getElementsByClassName('alert');
      for (var i = 0; i < alerts.length; i++) {
        alerts[i].innerHTML = '\u00ABlink copied\u00BB';
        setTimeout((function(i){ return function(){ alerts[i].innerHTML = ''; }; })(i), 1600);
      }
    });
  }
</script>
{% endif %}

{% if page.toc %}
<script src="https://cdn.jsdelivr.net/gh/cferdinandi/gumshoe@5.1.1/dist/gumshoe.polyfills.min.js"></script>
<script>
  var spy = new Gumshoe("#toc-content a", {
    navClass:"active", contentClass:"underline", nested:0,
    nestedClass:"active", offset:20, reflow:1, events:1
  });
</script>
{% endif %}

{% if page.mathjax %}
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    extensions: ["tex2jax.js"],
    tex2jax: { inlineMath: [['$','$'],["\\(","\\)"]], displayMath: [['$$','$$'],["\\[","\\]"]], processEscapes: true },
    "CommonHTML": { linebreaks: { automatic: true } }
  });
</script>
<script src="//mathjax.rstudio.com/latest/MathJax.js?config=TeX-MML-AM_CHTML"></script>
{% endif %}

<script>
  (function() {
    var searchInput = document.getElementById('search-input');
    var resultsContainer = document.getElementById('results-container');
    if (searchInput && resultsContainer) {
      SimpleJekyllSearch({
        searchInput: searchInput,
        resultsContainer: resultsContainer,
        json: '{{ relativebase }}search.json',
        searchResultTemplate: '<li><a href="{url}" title="{description}">{title}</a><p>{description}</p></li>',
        noResultsText: 'No results found',
        fuzzy: false,
        exclude: ['Welcome']
      });
    }
  })();
</script>

{% if page.infinite %}
<script src="{{ relativebase }}assets/js/infinite-jekyll.js"></script>
{% endif %}

{%- if site.extensions.mermaid_enable and page.mermaid -%}
<script type="text/javascript" src="/assets/js/mermaid.min.js"></script>
<script type="text/javascript">
  (function () {
    mermaid.initialize({ startOnLoad: true, darkMode: false });
    window.mermaid.init(undefined, document.querySelectorAll('pre code.language-mermaid'));
  })()
</script>
{%- endif -%}
