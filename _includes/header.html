{% include calculate_relative_base.html %}
{% include escape-404.html %}

<header class="fixed top-0 w-full z-50 bg-[#f7f9fb]/80 backdrop-blur-xl bg-gradient-to-b from-slate-100/50 to-transparent">
  <nav class="max-w-7xl mx-auto flex justify-between items-center px-8 py-6">
    <a href="{{ relativebase }}" class="text-xl font-bold tracking-tighter text-slate-900 font-headline no-underline">{{ site.title }}</a>
    <div class="hidden md:flex items-center gap-10">
      <a class="font-headline tracking-tight text-sm uppercase font-semibold transition-colors no-underline {% if page.url == '/' or page.url == '/index.html' %}text-slate-900 border-b-2 border-tertiary pb-1{% else %}text-slate-500 hover:text-slate-900{% endif %}" href="{{ relativebase }}">Home</a>
      <a class="font-headline tracking-tight text-sm uppercase font-semibold transition-colors no-underline {% if page.url contains 'resume' %}text-slate-900 border-b-2 border-tertiary pb-1{% else %}text-slate-500 hover:text-slate-900{% endif %}" href="{{ relativebase }}resume.html">Experience</a>
      <a class="font-headline tracking-tight text-sm uppercase font-semibold transition-colors no-underline {% if page.url contains 'archive' or page.layout == 'post' %}text-slate-900 border-b-2 border-tertiary pb-1{% else %}text-slate-500 hover:text-slate-900{% endif %}" href="{{ relativebase }}archive.html">Blog</a>
      <a class="font-headline tracking-tight text-sm uppercase font-semibold transition-colors no-underline {% if page.url contains 'contact' %}text-slate-900 border-b-2 border-tertiary pb-1{% else %}text-slate-500 hover:text-slate-900{% endif %}" href="{{ relativebase }}contact.html">Contact</a>
    </div>
    <div class="flex items-center gap-4">
      {% if site.linkedin %}
      <a href="https://www.linkedin.com/in/{{ site.linkedin }}" target="_blank" rel="noopener" class="p-2 text-slate-600 hover:bg-slate-100/50 transition-all duration-200 rounded-lg" aria-label="LinkedIn">
        <span class="material-symbols-outlined" style="font-size:20px">link</span>
      </a>
      {% endif %}
      {% if site.github %}
      <a href="https://github.com/{{ site.github }}" target="_blank" rel="noopener" class="p-2 text-slate-600 hover:bg-slate-100/50 transition-all duration-200 rounded-lg" aria-label="GitHub">
        <span class="material-symbols-outlined" style="font-size:20px">terminal</span>
      </a>
      {% endif %}
      <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-600 hover:bg-slate-100/50 transition-all rounded-lg" aria-label="Menu">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </nav>
  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden md:hidden bg-surface/95 backdrop-blur-xl border-t border-outline-variant/20 px-8 pb-6">
    <a class="block py-3 font-headline text-sm uppercase font-semibold text-slate-700 no-underline" href="{{ relativebase }}">Home</a>
    <a class="block py-3 font-headline text-sm uppercase font-semibold text-slate-700 no-underline" href="{{ relativebase }}resume.html">Experience</a>
    <a class="block py-3 font-headline text-sm uppercase font-semibold text-slate-700 no-underline" href="{{ relativebase }}archive.html">Blog</a>
    <a class="block py-3 font-headline text-sm uppercase font-semibold text-slate-700 no-underline" href="{{ relativebase }}contact.html">Contact</a>
  </div>
</header>

<script>
  document.getElementById('mobile-menu-btn').addEventListener('click', function() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });
</script>
