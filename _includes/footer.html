{% include calculate_relative_base.html %}
{% include escape-404.html %}

<footer class="bg-[#f7f9fb] border-t border-slate-200/20 w-full py-12 px-8">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
    <div class="font-headline font-bold text-slate-900 uppercase tracking-tight">{{ site.title }}</div>
    <div class="flex flex-wrap justify-center gap-8">
      {% if site.linkedin %}
      <a class="font-body text-xs tracking-widest uppercase text-slate-500 hover:text-tertiary transition-colors no-underline" href="https://www.linkedin.com/in/{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      {% endif %}
      {% if site.github %}
      <a class="font-body text-xs tracking-widest uppercase text-slate-500 hover:text-tertiary transition-colors no-underline" href="https://github.com/{{ site.github }}" target="_blank" rel="noopener">GitHub</a>
      {% endif %}
      <a class="font-body text-xs tracking-widest uppercase text-slate-500 hover:text-tertiary transition-colors no-underline" href="{{ relativebase }}privacy.html">Privacy Policy</a>
      <a class="font-body text-xs tracking-widest uppercase text-slate-500 hover:text-tertiary transition-colors no-underline" href="{{ relativebase }}security-disclosure.html">Security Disclosure</a>
    </div>
    <div class="font-body text-xs tracking-widest uppercase text-[#565e74]">
      &copy; {{ site.time | date: '%Y' }} {{ site.author }}.
    </div>
  </div>
</footer>
