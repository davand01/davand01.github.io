{% include calculate_relative_base.html %}

<div class="flex gap-6 items-center p-8 bg-surface-container-low rounded-sm">
  {% if site.author-pic %}
  <img src="{{ relativebase }}assets/img/{{ site.author-pic }}" alt="{{ site.author }}" class="w-16 h-16 rounded-full object-cover flex-shrink-0">
  {% endif %}
  <div>
    <h3 class="font-headline text-lg font-bold mb-1">{{ site.author }}</h3>
    <p class="text-sm text-on-surface-variant leading-relaxed">{{ site.description }}</p>
    <div class="flex gap-4 mt-3">
      {% if site.linkedin %}
      <a href="https://www.linkedin.com/in/{{ site.linkedin }}" target="_blank" rel="noopener" class="text-outline hover:text-tertiary transition-colors text-xs font-label tracking-widest uppercase font-bold no-underline">LinkedIn</a>
      {% endif %}
      {% if site.github %}
      <a href="https://github.com/{{ site.github }}" target="_blank" rel="noopener" class="text-outline hover:text-tertiary transition-colors text-xs font-label tracking-widest uppercase font-bold no-underline">GitHub</a>
      {% endif %}
    </div>
  </div>
</div>
