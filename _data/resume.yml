      and with development teams to embed security requirements into
      internal systems. Much of the work supported systems to be
      accredited according to KSF (Requirements on Security Functions)
      and uphold communications security.
    highlights:
      - Designed and implemented controls for both ISO 27001/27002 and protective security legislation.
      - Served as acting unit manager and member of department leadership team.
      - >-
        Established security requirements processes for in-house software
        development. Based the ISMS on ISO 27001 and 27002, and authored a
        requirements catalogue aligned with the information
        classification levels of systems.
