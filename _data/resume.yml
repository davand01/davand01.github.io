  website: https://www.davidandersson.se
  linkedin: https://www.linkedin.com/in/davidandersson-se
  github: https://github.com/davand01
  summary: >-
    Information security leader with more than two decades of experience
    spanning enterprise architecture, compliance, and engineering leadership.
    Track record of building security programs from the ground up: from ISMS
    design and ISO 27001 certification to scaling product security teams at
    high-growth software companies. Equally comfortable shaping strategy at
    the executive table and diving into technical security reviews.
  approach: >-
    Security as a service function, not a gatekeeper. The shift from "no, you
    can't do that" to "yes, let's find a better way to do that" is the work.
    Best results come from addressing security early in the design phase and
    treating engineering teams as partners, not subjects of compliance.

