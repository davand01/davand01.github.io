experience:
  - company: Grafana Labs AB
    title: Director of Security Engineering
    logo: grafana_labs_logo.jpeg
    start: "2025"
    end: Present
    location: Remote
    sector: SaaS observability, open source
    scope: Promoted from Senior Manager, Engineering in Security (Oct 2024). Team of 10 across two sub-teams. Staff and budget responsibility.
    summary: >-
      Leading a team of 10 across two sub-teams: one building VulnO11y, an
      internal observability tool for vulnerability management across the
      Grafana ecosystem, and one serving as internal security consultants
      providing architecture reviews, vulnerability remediation support, and
      hands-on AppSec advisory across engineering teams.
    highlights:
      - >-
        Built and operate VulnO11y, an observability tool that models the
        full vulnerability lifecycle as a state machine, from detection
        through CVE publication, embargo handling, and SLO-driven
        remediation. Ingests from Trivy, Grype, and OSV across first-party
        and third-party scope, and tracks the point a vulnerability entered
        a repository, image, or artefact against the agreed time-to-fix.
      - >-
        Co-presented at GrafanaCON 2026 on the April 2025 CI/CD incident
        response. Full attack reconstruction, canary-token detection, and
        open-source forensics (Loki, Trufflehog, Zizmor, Gato-X) that
        confirmed no customer or user data was affected.
      - >-
        Evolving threat modeling practice. STRIDE remains the default,
        with the team building a custom model inspired by STRIDE and PASTA
        to cover AI-introduced threat surfaces where classic frameworks
        fall short.
      - >-
        Own the AppSec testing toolchain across the organisation: SAST,
        SCA, external penetration testing, and the bug bounty and VDP
        programme.
      - Internal advisory function providing architecture reviews and remediation support to product teams.
      - Staff and budget ownership, operational and strategic improvements across incident management, secure SDLC, and vendor governance.
    keywords:
      - Vulnerability Management
      - VulnO11y
