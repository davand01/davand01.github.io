basics:
  name: David Andersson
  title: Security Leader
  label: Building & Scaling Security Programs
  location: Sweden (remote)
  email: info@davidandersson.se
  website: https://www.davidandersson.se
  linkedin: https://www.linkedin.com/in/davidandersson-se
  github: https://github.com/davand01
  summary: >-
    I'm a security leader with 20+ years spanning enterprise architecture,
    compliance and engineering leadership. I've built and scaled security
    programs from the ground up, from ISMS design and ISO 27001
    certification to leading full security functions at high-growth SaaS
    companies and government agencies, and I'm equally comfortable shaping
    strategy at the executive table or in a hands-on technical review. <br />
    My work spans the full security function: governance that satisfies
    auditors without becoming theatre, application security and detection
    engineering close enough to the code that I can still read it, and the
    leadership judgement to build a team around all of it.
  approach: >-
    Security as a service function, not a gatekeeper. The shift from "no,
    you can't do that" to "yes, let's find a better way" is the work, and
    the best results come from bringing security into the design phase and
    treating engineering teams as partners.

